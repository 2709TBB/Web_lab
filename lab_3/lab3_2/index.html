<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Calculator</h1>
        <div class="form-group">
            <input type="text" id="display" class="form-control" disabled>
        </div>
        <div class="calculator-grid">
            <button class="btn btn-primary" onclick="appendToDisplay('1')">1</button>
            <button class="btn btn-primary" onclick="appendToDisplay('2')">2</button>
            <button class="btn btn-primary" onclick="appendToDisplay('3')">3</button>
            <button class="btn btn-primary" onclick="appendToDisplay('+')">+</button>
    
            <button class="btn btn-primary" onclick="appendToDisplay('4')">4</button>
            <button class="btn btn-primary" onclick="appendToDisplay('5')">5</button>
            <button class="btn btn-primary" onclick="appendToDisplay('6')">6</button>
            <button class="btn btn-primary" onclick="appendToDisplay('-')">-</button>
    
            <button class="btn btn-primary" onclick="appendToDisplay('7')">7</button>
            <button class="btn btn-primary" onclick="appendToDisplay('8')">8</button>
            <button class="btn btn-primary" onclick="appendToDisplay('9')">9</button>
            <button class="btn btn-primary" onclick="appendToDisplay('*')">*</button>
    
            <button class="btn btn-primary" onclick="appendToDisplay('0')">0</button>
            <button class="btn btn-primary" onclick="appendToDisplay('(')">(</button>
            <button class="btn btn-primary" onclick="appendToDisplay(')')">)</button>
            <button class="btn btn-primary" onclick="appendToDisplay('/')">/</button>
    
            <button class="btn btn-danger" onclick="clearDisplay()">C</button>
            <button class="btn btn-success" onclick="calculate()">=</button>
        </div>
        <h3 class="mt-4">History</h3>
        <div id="history" class="list-group"></div>
        <button class="btn btn-warning mt-2" onclick="clearHistory()">Clear History</button>
    </div>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
